<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand-Eye Coordination Trainer</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
    text-align:center;
}

#menu{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#menu h1{
    margin:0;
    font-size:42px;
}

#menu p{
    color:#aaa;
    margin:15px 0 30px;
}

#startButton{
    font-size:24px;
    padding:15px 40px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#score{
    font-size:32px;
    margin-top:15px;
}

#feedback{
    height:40px;
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

#game{
    position:relative;
    width:900px;
    height:700px;
    margin:10px auto;
    border:2px solid #444;
    background:#181818;
    overflow:hidden;
}

.lane{
    position:absolute;
    width:100px;
    height:100%;
}

.target{
    position:absolute;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);
    font-size:90px; /* Bigger circles */
    transition:all 0.15s;
    user-select:none;
}

.target.hit{
    transform:translateX(-50%) scale(1.3);
    text-shadow:
        0 0 15px white,
        0 0 30px white,
        0 0 50px white;
}

.key{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#bbb;
    font-weight:bold;
}

.note{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:75px; /* Bigger falling notes */
    user-select:none;
}

.perfect{
    color:#6dff6d;
}

.good{
    color:#ffe66d;
}

.okay{
    color:#ffb14a;
}

.miss{
    color:#ff6666;
}
</style>
</head>
<body>

<div id="menu">
    <h1>Hand-Eye Coordination Trainer</h1>
    <p>Press A S D F H J K L when the falling circles reach the targets.</p>
    <button id="startButton">Start</button>
</div>

<div id="score">Score: 0</div>
<div id="feedback"></div>

<div id="game"></div>

<script>

const game = document.getElementById("game");
const scoreDisplay = document.getElementById("score");
const feedback = document.getElementById("feedback");
const startButton = document.getElementById("startButton");
const menu = document.getElementById("menu");

const keys = ["A","S","D","F","H","J","K","L"];

/* Gap between F and H */
const lanePositions = [
    20,   // A
    120,  // S
    220,  // D
    320,  // F

    500,  // H
    600,  // J
    700,  // K
    800   // L
];

const laneWidth = 100;

let score = 0;
let notes = [];
let gameStarted = false;
let spawnInterval;

const targets = [];

for(let i=0;i<8;i++){

    const lane = document.createElement("div");
    lane.className = "lane";
    lane.style.left = lanePositions[i] + "px";

    const target = document.createElement("div");
    target.className = "target";
    target.textContent = "○";

    const key = document.createElement("div");
    key.className = "key";
    key.textContent = keys[i];

    lane.appendChild(target);
    lane.appendChild(key);

    game.appendChild(lane);

    targets.push(target);
}

function updateScore(){
    scoreDisplay.textContent = "Score: " + score;
}

function pulseLane(index){

    const target = targets[index];

    target.classList.add("hit");

    setTimeout(()=>{
        target.classList.remove("hit");
    },150);
}

function showFeedback(text,className){

    feedback.textContent = text;
    feedback.className = className;

    clearTimeout(showFeedback.timeout);

    showFeedback.timeout = setTimeout(()=>{
        feedback.textContent = "";
        feedback.className = "";
    },300);
}

function spawnNote(){

    if(!gameStarted) return;

    const lane = Math.floor(Math.random()*8);

    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "●";

    note.style.left =
        (lanePositions[lane] + laneWidth/2) + "px";

    note.style.top = "-80px";

    game.appendChild(note);

    notes.push({
        lane: lane,
        y: -80,
        element: note
    });
}

startButton.addEventListener("click",()=>{

    menu.style.display = "none";

    gameStarted = true;

    spawnInterval = setInterval(spawnNote,800);
});

const hitLine = 555;

document.addEventListener("keydown",(e)=>{

    if(!gameStarted) return;

    const key = e.key.toUpperCase();
    const lane = keys.indexOf(key);

    if(lane === -1) return;

    let closest = null;
    let closestIndex = -1;
    let closestDistance = Infinity;

    for(let i=0;i<notes.length;i++){

        if(notes[i].lane !== lane)
            continue;

        const distance =
            Math.abs(notes[i].y - hitLine);

        if(distance < closestDistance){

            closestDistance = distance;
            closest = notes[i];
            closestIndex = i;
        }
    }

    if(!closest){

        score--;
        updateScore();
        showFeedback("MISS -1","miss");
        return;
    }

    let gained = 0;

    if(closestDistance <= 18){

        gained = 3;
        showFeedback("PERFECT +3","perfect");

    }else if(closestDistance <= 40){

        gained = 2;
        showFeedback("GOOD +2","good");

    }else if(closestDistance <= 70){

        gained = 1;
        showFeedback("OKAY +1","okay");

    }else{

        score--;
        updateScore();
        showFeedback("MISS -1","miss");
        return;
    }

    pulseLane(lane);

    score += gained;

    closest.element.remove();
    notes.splice(closestIndex,1);

    updateScore();
});

function gameLoop(){

    if(gameStarted){

        for(let i=notes.length-1;i>=0;i--){

            notes[i].y += 4;

            notes[i].element.style.top =
                notes[i].y + "px";

            if(notes[i].y > 760){

                notes[i].element.remove();
                notes.splice(i,1);
            }
        }
    }

    requestAnimationFrame(gameLoop);
}

updateScore();
gameLoop();

</script>

</body>
</html>
